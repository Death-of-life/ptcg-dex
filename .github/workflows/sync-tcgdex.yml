name: Sync TCGdex Data

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "full 或 incremental"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      TCGDEX_BASE_URL: ${{ secrets.TCGDEX_BASE_URL }}
      CF_R2_PUBLIC_BASE_URL: ${{ secrets.CF_R2_PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install latest Wrangler CLI
        run: npm install -g wrangler@latest

      - name: Verify Cloudflare auth
        run: |
          if [ -n "${CLOUDFLARE_API_KEY:-}" ] && [ -n "${CLOUDFLARE_EMAIL:-}" ]; then
            echo "Using Global API Key authentication"
            echo "CLOUDFLARE_API_TOKEN=" >> "$GITHUB_ENV"
          elif [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Using API Token authentication"
          else
            echo "::error::缺少 Cloudflare 鉴权。请配置 CLOUDFLARE_API_TOKEN，或配置 CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL。"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID 未设置。某些 token 会在 /memberships 校验失败（9106）。"
          fi
          wrangler whoami || (echo "::error::Cloudflare 鉴权失败。请检查 Token 或 Global API Key 配置。"; exit 1)

      - name: Render wrangler.toml from secrets
        run: |
          if ! echo "${CF_R2_PUBLIC_BASE_URL}" | grep -qE '^https?://'; then
            CF_R2_PUBLIC_BASE_URL="https://${CF_R2_PUBLIC_BASE_URL}"
          fi
          export CF_R2_PUBLIC_BASE_URL
          npm run wrangler:render

      - name: Apply D1 migrations
        run: wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote --config apps/worker/wrangler.toml

      - name: Debug R2 objects (before sync)
        continue-on-error: true
        run: |
          echo "ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:0:6}..."
          echo "BUCKET=$R2_BUCKET_NAME"
          wrangler r2 bucket list
          echo "从 D1 抽样 5 个 zh-tw 对象 key 并探测 R2 是否存在"
          keys_json="$(wrangler d1 execute "$D1_DATABASE_NAME" --remote --json --command "SELECT object_key FROM synced_images WHERE lang = 'zh-tw' ORDER BY updated_at DESC LIMIT 5;")"
          mapfile -t keys < <(echo "$keys_json" | node -e '
            let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{
              try{
                const rows=(JSON.parse(s)?.[0]?.results)||[];
                for (const r of rows) if (r?.object_key) console.log(r.object_key);
              }catch(e){ process.exit(0); }
            });
          ')
          if [ "${#keys[@]}" -eq 0 ]; then
            echo "D1 中没有 zh-tw 的 synced_images 记录"
          else
            for key in "${keys[@]}"; do
              out="/tmp/r2-probe-$(echo "$key" | tr '/.' '__')"
              if wrangler r2 object get "$R2_BUCKET_NAME/$key" --file "$out" >/dev/null 2>&1; then
                size="$(wc -c < "$out" | tr -d ' ')"
                echo "R2 命中: $key (${size} bytes)"
              else
                echo "R2 缺失: $key"
              fi
              rm -f "$out"
            done
          fi

      - name: Run incremental sync (scheduled)
        if: github.event_name == 'schedule'
        run: npm --workspace @ptcg-dex/sync run sync

      - name: Run manual sync
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then
            npm --workspace @ptcg-dex/sync run sync -- --full
          else
            npm --workspace @ptcg-dex/sync run sync
          fi

      - name: Debug R2 objects (after sync)
        if: always()
        continue-on-error: true
        run: |
          echo "ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:0:6}..."
          echo "BUCKET=$R2_BUCKET_NAME"
          wrangler r2 bucket list
          echo "从 D1 抽样 5 个 zh-tw 对象 key 并探测 R2 是否存在"
          keys_json="$(wrangler d1 execute "$D1_DATABASE_NAME" --remote --json --command "SELECT object_key FROM synced_images WHERE lang = 'zh-tw' ORDER BY updated_at DESC LIMIT 5;")"
          mapfile -t keys < <(echo "$keys_json" | node -e '
            let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{
              try{
                const rows=(JSON.parse(s)?.[0]?.results)||[];
                for (const r of rows) if (r?.object_key) console.log(r.object_key);
              }catch(e){ process.exit(0); }
            });
          ')
          if [ "${#keys[@]}" -eq 0 ]; then
            echo "D1 中没有 zh-tw 的 synced_images 记录"
          else
            for key in "${keys[@]}"; do
              out="/tmp/r2-probe-$(echo "$key" | tr '/.' '__')"
              if wrangler r2 object get "$R2_BUCKET_NAME/$key" --file "$out" >/dev/null 2>&1; then
                size="$(wc -c < "$out" | tr -d ' ')"
                echo "R2 命中: $key (${size} bytes)"
              else
                echo "R2 缺失: $key"
              fi
              rm -f "$out"
            done
          fi
