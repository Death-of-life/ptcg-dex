name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      CF_R2_PUBLIC_BASE_URL: ${{ secrets.CF_R2_PUBLIC_BASE_URL }}
      CF_PAGES_PROJECT_NAME: ${{ secrets.CF_PAGES_PROJECT_NAME }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install latest Wrangler CLI
        run: npm install -g wrangler@latest

      - name: Verify Cloudflare auth
        run: |
          if [ -n "${CLOUDFLARE_API_KEY:-}" ] && [ -n "${CLOUDFLARE_EMAIL:-}" ]; then
            echo "Using Global API Key authentication"
            echo "CLOUDFLARE_API_TOKEN=" >> "$GITHUB_ENV"
          elif [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Using API Token authentication"
          else
            echo "::error::缺少 Cloudflare 鉴权。请配置 CLOUDFLARE_API_TOKEN，或配置 CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL。"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID 未设置。某些 token 会在 /memberships 校验失败（9106）。"
          fi
          wrangler whoami || (echo "::error::Cloudflare 鉴权失败。请检查 Token 或 Global API Key 配置。"; exit 1)

      - name: Render wrangler.toml from secrets
        run: npm run wrangler:render

      - name: Lint OpenAPI
        run: npm run openapi:lint

      - name: Check API route drift
        run: npm run api:drift

      - name: Prepare API docs artifact
        run: cp openapi/openapi.yaml apps/web/public/openapi.yaml

      - name: Build web app
        run: |
          if [ -z "${NEXT_PUBLIC_API_BASE_URL:-}" ]; then
            echo "::error::缺少 NEXT_PUBLIC_API_BASE_URL secret（示例: https://ptcg-dex-api.<subdomain>.workers.dev）"
            exit 1
          fi
          NEXT_PUBLIC_R2_IMAGE_HOST=$(echo "${CF_R2_PUBLIC_BASE_URL}" | sed -E 's#^https?://##; s#/$##')
          export NEXT_PUBLIC_R2_IMAGE_HOST
          npm --workspace @ptcg-dex/web run build

      - name: Ensure Pages project exists
        run: |
          if [ -z "${CF_PAGES_PROJECT_NAME:-}" ]; then
            echo "::error::缺少 CF_PAGES_PROJECT_NAME secret。"
            exit 1
          fi
          echo "确保 Pages project ${CF_PAGES_PROJECT_NAME} 存在（幂等）"
          set +e
          CREATE_OUTPUT=$(wrangler pages project create "${CF_PAGES_PROJECT_NAME}" --production-branch main 2>&1)
          CREATE_EXIT=$?
          set -e
          if [ $CREATE_EXIT -eq 0 ]; then
            echo "Pages project ${CF_PAGES_PROJECT_NAME} 创建成功"
          else
            echo "$CREATE_OUTPUT"
            if echo "$CREATE_OUTPUT" | grep -qE "already exists|8000002"; then
              echo "Pages project ${CF_PAGES_PROJECT_NAME} 已存在，继续部署"
            else
              echo "::error::创建 Pages project 失败"
              exit $CREATE_EXIT
            fi
          fi

      - name: Deploy Worker
        run: wrangler deploy --config apps/worker/wrangler.toml

      - name: Deploy Pages static site
        run: wrangler pages deploy apps/web/out --project-name "${CF_PAGES_PROJECT_NAME}"
